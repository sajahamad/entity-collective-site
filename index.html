<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entity Collective - Art Science Research Laboratory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <img src="image/logo.jpg" alt="logo" />
        <div class="logo-text">
          <h1>
            ENTITY <br />
            COLLECTIVE
          </h1>
          <span>art science research laboratory</span>
        </div>
      </div>
      <nav class="nav">
        <ul>
          <li><a href="#" class="nav-home">Home</a></li>
          <li><a href="#" class="nav-about">About Us</a></li>
          <li><a href="#" class="nav-services">Services</a></li>
          <li><a href="#" class="nav-projects">Projects</a></li>
          <li><a href="#" class="nav-contact">Contact Us</a></li>
        </ul>
      </nav>
    </header>

    <main class="main-container">
      <aside class="sidebar-left">
        <div class="row-flex">
          <div class="box blue-box"></div>
          <div class="box insta-box"><i class="fab fa-instagram"></i></div>
        </div>

        <div class="event-card">
          <h3>Event Title</h3>
          <p>Host hunting film screening</p>
          <span>📅 01-04-2025</span>
          <button class="ticket-btn">Ticket</button>
        </div>

        <div class="row-flex">
          <div class="column-flex">
            <div class="box yellow-box"></div>
            <div class="box yt-box"><i class="fab fa-youtube"></i></div>
          </div>
          <div class="box green-tall"></div>
        </div>
      </aside>

      <section class="main-content">
        <div class="slider-container">
          <img src="image/home.jpg" alt="Building" />
          <div class="slider-text">
            <h2>First slide label</h2>
            <p>Some representative placeholder content for the first slide.</p>
          </div>
        </div>
      </section>

      <aside class="sidebar-right">
        <div class="row-flex">
          <div class="box orange-tall"></div>
          <div class="column-flex">
            <div class="box green-box"></div>
            <div class="box fb-box"><i class="fab fa-facebook"></i></div>
          </div>
        </div>
        <div class="poster-box">
          <img src="image/left.jpg" alt="Poster Film" />
        </div>
      </aside>
    </main>
  </body>
</html>
